name: smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm bpftrace z3 podman

      - name: Fetch vault branch
        run: git fetch origin vault:vault

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Run native smoke tests (Minimal, Systems, Proofs, eBPF, Full)
        env:
          LOOM_CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          # Run non-sudo native tests
          npm run smoke -- --profile minimal --require-pdf --require-all
          npm run smoke -- --profile systems --require-pdf --require-all
          npm run smoke -- --profile proofs --require-pdf --require-all
          
          # Run sudo native tests
          sudo --preserve-env=PATH,LOOM_CHROME_PATH npm run smoke -- --profile ebpf --require-pdf --require-all
          sudo --preserve-env=PATH,LOOM_CHROME_PATH npm run smoke -- --profile full --require-pdf --require-all
          
          # Backup native artifacts to prevent overwrite
          mkdir -p .loom/artifacts-backup/native
          mv .loom/artifacts/smoke/* .loom/artifacts-backup/native/

      - name: Run Docker container smoke tests (Minimal, Systems)
        env:
          LOOM_CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          # 1. Reset vault and configure for docker-test
          git checkout -B vault origin/vault
          mkdir -p .obsidian/plugins/loom/containers/docker-test
          cat > .obsidian/plugins/loom/containers/docker-test/config.json <<JSON
          {
            "runtime": "docker",
            "image": "docker.io/library/python:3.12-bookworm",
            "elevation": {
              "mode": "default"
            },
            "languages": {
              "shell": { "useDefault": true },
              "sh": { "useDefault": true },
              "python": { "useDefault": true },
              "c": { "useDefault": true },
              "cpp": { "useDefault": true }
            }
          }
          JSON
          printf -- "---\nloom-execution: docker-test\n---\n\n" | cat - "Smoke Suite.md" > temp_suite.md
          mv temp_suite.md "Smoke Suite.md"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "Smoke Suite.md" .obsidian/plugins/loom/containers/docker-test/config.json
          git commit -m "Configure docker-test vault"
          git checkout -f -
          
          # 2. Pull Docker image
          sudo docker pull docker.io/library/python:3.12-bookworm
          
          # 3. Run Docker tests
          sudo --preserve-env=PATH,LOOM_CHROME_PATH npm run smoke -- --profile minimal --require-pdf --require-all
          sudo --preserve-env=PATH,LOOM_CHROME_PATH npm run smoke -- --profile systems --require-pdf --require-all
          
          # Backup docker artifacts to prevent overwrite
          mkdir -p .loom/artifacts-backup/docker
          mv .loom/artifacts/smoke/* .loom/artifacts-backup/docker/

      - name: Run Podman container smoke tests (Minimal, Systems)
        env:
          LOOM_CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          # 1. Reset vault and configure for podman-test
          git checkout -B vault origin/vault
          mkdir -p .obsidian/plugins/loom/containers/podman-test
          cat > .obsidian/plugins/loom/containers/podman-test/config.json <<JSON
          {
            "runtime": "podman",
            "image": "docker.io/library/python:3.12-bookworm",
            "elevation": {
              "mode": "default"
            },
            "languages": {
              "shell": { "useDefault": true },
              "sh": { "useDefault": true },
              "python": { "useDefault": true },
              "c": { "useDefault": true },
              "cpp": { "useDefault": true }
            }
          }
          JSON
          printf -- "---\nloom-execution: podman-test\n---\n\n" | cat - "Smoke Suite.md" > temp_suite.md
          mv temp_suite.md "Smoke Suite.md"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "Smoke Suite.md" .obsidian/plugins/loom/containers/podman-test/config.json
          git commit -m "Configure podman-test vault"
          git checkout -f -
          
          # 2. Pull Podman image
          sudo podman pull docker.io/library/python:3.12-bookworm
          
          # 3. Run Podman tests
          sudo --preserve-env=PATH,LOOM_CHROME_PATH npm run smoke -- --profile minimal --require-pdf --require-all
          sudo --preserve-env=PATH,LOOM_CHROME_PATH npm run smoke -- --profile systems --require-pdf --require-all
          
          # Backup podman artifacts
          mkdir -p .loom/artifacts-backup/podman
          mv .loom/artifacts/smoke/* .loom/artifacts-backup/podman/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loom-smoke-linux-artifacts
          path: .loom/artifacts-backup/
