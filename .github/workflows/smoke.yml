name: smoke

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-matrix:
    name: smoke (${{ matrix.profile }}, ${{ matrix.container }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 9
      matrix:
        include:
          - profile: minimal
            container: none
          - profile: systems
            container: none
          - profile: proofs
            container: none
          - profile: ebpf
            container: none
          - profile: full
            container: none
          - profile: minimal
            container: docker-test
          - profile: systems
            container: docker-test
          - profile: minimal
            container: podman-test
          - profile: systems
            container: podman-test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - name: Install local Actions Chrome
        if: ${{ env.ACT }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates wget
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/google-chrome-stable_current_amd64.deb
          echo "LOTUS_CHROME_PATH=/usr/bin/google-chrome-stable" >> "${GITHUB_ENV}"
      - uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce
        if: ${{ env.ACT != 'true' }}
        id: setup-chrome
      - name: Install smoke toolchain packages
        if: matrix.profile == 'proofs' || matrix.profile == 'ebpf' || matrix.profile == 'full' || matrix.container == 'podman-test'
        run: |
          packages=()
          if [[ "${{ matrix.profile }}" == "proofs" || "${{ matrix.profile }}" == "full" ]]; then
            packages+=(z3)
          fi
          if [[ "${{ matrix.profile }}" == "ebpf" || "${{ matrix.profile }}" == "full" ]]; then
            packages+=(clang llvm bpftrace)
          fi
          if [[ "${{ matrix.container }}" == "podman-test" ]]; then
            packages+=(podman)
          fi
          sudo apt-get update
          sudo apt-get install -y "${packages[@]}"
      - run: git fetch --depth=1 origin +vault:vault
      - name: Configure container test vault
        if: matrix.container != 'none'
        run: |
          git checkout vault
          group="${{ matrix.container }}"
          runtime="${group%-test}"
          group_dir=".obsidian/plugins/lotus/containers/${group}"
          mkdir -p "${group_dir}"
          rm -f "${group_dir}/Dockerfile"
          cat > "${group_dir}/config.json" <<JSON
          {
            "runtime": "${runtime}",
            "image": "docker.io/library/python:3.12-bookworm",
            "elevation": {
              "mode": "default"
            },
            "languages": {
              "shell": {
                "useDefault": true
              },
              "sh": {
                "useDefault": true
              },
              "python": {
                "useDefault": true
              },
              "c": {
                "useDefault": true
              },
              "cpp": {
                "useDefault": true
              }
            }
          }
          JSON
          printf -- "---\nlotus-execution: ${{ matrix.container }}\n---\n\n" | cat - "Smoke Suite.md" > temp_suite.md
          mv temp_suite.md "Smoke Suite.md"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "Smoke Suite.md" "${group_dir}/config.json"
          git commit -m "Configure container smoke fixture"
          git checkout -f -
      - run: npm ci --legacy-peer-deps
      - name: Pull container smoke image
        if: matrix.container != 'none'
        run: |
          runtime="${{ matrix.container }}"
          sudo "${runtime%-test}" pull docker.io/library/python:3.12-bookworm
      - run: npm run smoke -- --profile ${{ matrix.profile }} --require-pdf --require-all
        if: matrix.profile != 'ebpf' && matrix.profile != 'full' && matrix.container == 'none'
        env:
          LOTUS_CHROME_PATH: ${{ env.LOTUS_CHROME_PATH || steps.setup-chrome.outputs.chrome-path }}
      - run: sudo env "PATH=${PATH}" "LOTUS_CHROME_PATH=${LOTUS_CHROME_PATH}" npm run smoke -- --profile ${{ matrix.profile }} --require-pdf --require-all
        if: matrix.profile == 'ebpf' || matrix.profile == 'full' || matrix.container != 'none'
        env:
          LOTUS_CHROME_PATH: ${{ env.LOTUS_CHROME_PATH || steps.setup-chrome.outputs.chrome-path }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: lotus-smoke-${{ matrix.profile }}-${{ matrix.container }}
          path: .lotus/artifacts/smoke/${{ matrix.profile }}

  required-smoke-statuses:
    name: Publish required smoke statuses
    runs-on: ubuntu-latest
    needs: smoke-matrix
    if: ${{ always() }}
    steps:
      - name: Publish required status contexts
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RESULT: ${{ needs.smoke-matrix.result }}
        run: |
          state="failure"
          description="Smoke matrix failed"
          if [ "${RESULT}" = "success" ]; then
            state="success"
            description="Smoke matrix passed"
          fi

          for context in "smoke" "smoke (full)"; do
            payload="$(node -e 'process.stdout.write(JSON.stringify({state: process.argv[1], context: process.argv[2], description: process.argv[3]}))' "${state}" "${context}" "${description}")"
            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -d "${payload}"
          done

          test "${state}" = "success"
      - name: Enforce smoke matrix result for fork pull requests
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        env:
          RESULT: ${{ needs.smoke-matrix.result }}
        run: |
          echo "Skipping synthetic commit statuses for fork pull request; GITHUB_TOKEN is read-only."
          test "${RESULT}" = "success"
